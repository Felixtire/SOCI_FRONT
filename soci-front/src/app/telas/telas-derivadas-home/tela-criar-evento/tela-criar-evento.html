<div class="main">

  <div class="formulario-container">

    <div class="formulario">

      <form [formGroup]="formularioEvento" (ngSubmit)="criarEvento()">

        <!-- TÍTULO -->
        <div class="form-titles">

          <div class="icon-user">
            📝
          </div>

          <h1>Criar Evento</h1>
          <h2>Adicione um novo evento ao calendário</h2>

        </div>



        <!-- TÍTULO DO EVENTO -->
        <div class="input-group">
          <input type="text" placeholder="Título do evento" formControlName="titulo" />
        </div>

        <!-- DATA -->
        <div class="input-group">
          <input type="date" placeholder="Data do evento" formControlName="dataEvento" />
        </div>

        <!-- LOCAL -->
        <div class="input-group">
          <input type="text" placeholder="Local (opcional)" formControlName="local" />
        </div>

        <!-- DESCRIÇÃO -->
        <div class="input-group">
          <textarea rows="6" placeholder="Descrição (opcional)" formControlName="descricao"></textarea>
        </div>

        <!-- BOTÃO -->
        <div class="btn-form">
          <button type="submit" [disabled]="formularioEvento.invalid">
            Criar Evento
          </button>
        </div>

      </form>

    </div>

  </div>

</div>
