<div class="eventos-page">


  <header class="top-header">

    <div>

      <h1>
        📅 Eventos Acadêmicos
      </h1>

      <p>
        Confira os próximos eventos da instituição
      </p>

    </div>


    <button class="btn-criar"
            routerLink="/home/criar-evento">

      + Criar Evento

    </button>


  </header>



  <section class="eventos-container">


    <h2>
      Próximos Eventos
    </h2>



    <div class="eventos-grid">


      <div class="evento-card"
           *ngFor="let evento of eventos$ | async">



        <div class="evento-data">

          <strong>
            {{evento.dataEvento | date:'dd'}}
          </strong>

          <span>
{{evento.dataEvento | date:'MMM'}}
</span>

        </div>



        <div class="evento-info">


          <h3>
            {{evento.titulo}}
          </h3>


          <p>
            {{evento.descricao}}
          </p>



          <div class="dados">

<span>
📍 {{evento.local}}
</span>


            <span>
👤 Criado por {{evento.nomeUsuario}}
</span>


          </div>



        </div>


      </div>


    </div>


  </section>



</div>
