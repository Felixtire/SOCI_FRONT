<div class="main">

  <div class="formulario-container">

    <div class="formulario">

      <form>

        <div class="form-titles">

          <div class="icon-user">
            🔐
          </div>

          <h1>Bem-Vindo ao Soci</h1>
          <h2>Entre na sua conta</h2>

        </div>

        <div class="input-group">
          <input
            type="text"
            placeholder="Email ou RGM">
        </div>

        <div class="input-group">
          <input
            type="password"
            placeholder="Senha">
        </div>

        <div class="btn-form">
          <button type="submit" routerLink="/home">
            Entrar
          </button>
        </div>

        <p class="login-text">
          Não possui conta?

          <span class="login">
            <a routerLink="/cadastro">
              Criar Conta
            </a>
          </span>
        </p>

      </form>

    </div>

  </div>

</div>
